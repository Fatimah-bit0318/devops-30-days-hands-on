---
- name: Configure web server
  hosts: webservers
  become: yes

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install nginx
      apt:
        name: nginx
        state: present

    - name: Start nginx
      service:
        name: nginx
        state: started
        enabled: yes

    - name: Check nginx status
      command: systemctl status nginx
      register: nginx_status

    - name: Print nginx status
      debug:
        msg: "{{ nginx_status.stdout }}"
